services:
  db:
    image: postgres:16-alpine
    container_name: aura-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aura_dev_password}
      POSTGRES_DB: aura_gem_erp
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aura -d aura_gem_erp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    container_name: aura-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://aura:${POSTGRES_PASSWORD:-aura_dev_password}@db:5432/aura_gem_erp?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh}
      PORT: 4000
      NODE_ENV: production
      STORAGE_DRIVER: ${STORAGE_DRIVER:-disk}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-aura-gem-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    volumes:
      - api_uploads:/app/uploads
    expose:
      - "4000"

  web:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api/v1}
    container_name: aura-web
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: aura-nginx
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  db_data:
  api_uploads:
